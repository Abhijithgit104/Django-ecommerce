{% extends 'app/base.html' %}
{% load static %}

{% block content %}

<style>
  .product-card {
    border: none;
    border-radius: 15px;
    transition: all 0.3s ease-in-out;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
  }

  .product-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
  }

  .product-image {
    height: 220px;
    object-fit: cover;
    border-top-left-radius: 15px;
    border-top-right-radius: 15px;
  }

  .price {
    color: #198754;
    font-size: 1.2rem;
    font-weight: bold;
  }

  .btn-buy {
    background-color: #0d6efd;
    color: #fff;
    border-radius: 20px;
  }

  .btn-buy:hover {
    background-color: #084298;
  }
</style>

<div class="container">
  <h2 class="mb-4 text-center fw-bold">Our Products</h2>

  <div class="row g-4">
    {% for product in products %}
      <div class="col-sm-6 col-md-4 col-lg-3">
        <div class="card product-card h-100 d-flex align-items-center">
          <img
            src="{{ product.image_url }}"
            class="card-img-top product-image d-flex align-items-center w-75"
            alt="{{ product.title }}"
          >

          <div class="card-body d-flex flex-column align-items-center">
            <h5 class="card-title">{{ product.title }}</h5>

            <p class="card-text text-muted">
              {{ product.description|truncatewords:12 }}
            </p>

            <div class="mt-auto">
              <p class="price mb-2">₹ {{ product.price }}</p>
              <a href="#" class="btn btn-buy w-100">Add to Cart</a>
            </div>
          </div>
        </div>
      </div>
    {% empty %}
      <p class="text-center">No products available.</p>
    {% endfor %}
  </div>
</div>

{% endblock %}
